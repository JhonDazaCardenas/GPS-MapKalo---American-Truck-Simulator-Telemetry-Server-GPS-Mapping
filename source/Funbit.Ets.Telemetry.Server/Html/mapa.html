<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GPS MapKalo</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="mobile.css">
    
<script>
    // ==========================================
    // MODO OSCURO/CLARO: AUTOMÁTICO + MANUAL + VOZ
    // ==========================================
    (function() {
        let modoManual = null; // null = automático, true = oscuro, false = claro
        let clickCount = 0;
        let clickTimer = null;
        
        // Función para hablar (usa la misma voz de la app)
        function hablarModo(texto) {
            console.log('🔊 Modo:', texto);
            
            // Intentar usar el TTS de Cordova si está disponible
            if (window.parent && window.parent !== window) {
                try {
                    window.parent.postMessage({
                        type: 'speak',
                        text: texto
                    }, '*');
                } catch(e) {}
            }
            
            // Fallback: Web Speech API
            if (window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-MX';
                utterance.rate = 0.9;
                utterance.volume = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        function aplicarModo() {
            if (modoManual !== null) {
                if (modoManual) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
                actualizarBoton(modoManual);
                return;
            }
            
            const now = new Date();
            const hours = now.getHours();
            const isDarkMode = hours >= 18 || hours < 7;
            
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            actualizarBoton(isDarkMode);
            
            // Solo anunciar cambio automático si no hay modo manual
            if (modoManual === null) {
                const modoTexto = isDarkMode ? 'oscuro' : 'claro';
                console.log(`🌙☀️ Modo automático ${modoTexto} - Hora: ${hours}:00`);
            }
        }
        
        function actualizarBoton(isDark) {
            const darkModeBtn = document.getElementById('toggle-darkmode');
            if (darkModeBtn) {
                if (isDark) {
                    darkModeBtn.innerHTML = '☀️';
                    darkModeBtn.classList.add('dark-active');
                    darkModeBtn.title = 'Modo claro (click = manual, doble click = automático)';
                } else {
                    darkModeBtn.innerHTML = '🌙';
                    darkModeBtn.classList.remove('dark-active');
                    darkModeBtn.title = 'Modo oscuro (click = manual, doble click = automático)';
                }
            }
        }
        
        // Función global para cambiar manual
        window.toggleDarkModeManual = function() {
            const isDark = document.body.classList.contains('dark-mode');
            
            if (modoManual === null) {
                modoManual = !isDark;
            } else {
                modoManual = !modoManual;
            }
            
            aplicarModo();
            
            const modoTexto = modoManual ? 'oscuro' : 'claro';
            const mensaje = `Modo ${modoTexto} manual activado`;
            
            // Mostrar en pantalla
            const statusDiv = document.getElementById('status');
            if (statusDiv) {
                const originalText = statusDiv.innerHTML;
                statusDiv.innerHTML = `🎨 ${mensaje}`;
                setTimeout(() => {
                    if (statusDiv.innerHTML !== originalText && statusDiv.innerHTML.includes('modo')) {
                        statusDiv.innerHTML = originalText;
                    }
                }, 3000);
            }
            
            // ANUNCIAR POR VOZ
            hablarModo(mensaje);
            
            console.log(`🎨 ${mensaje}`);
        };
        
        // Función global para resetear a automático
        window.resetearModoAutomatico = function() {
            modoManual = null;
            aplicarModo();
            
            const mensaje = 'Modo automático restablecido';
            
            // Mostrar en pantalla
            const statusDiv = document.getElementById('status');
            if (statusDiv) {
                const originalText = statusDiv.innerHTML;
                statusDiv.innerHTML = `🔄 ${mensaje}`;
                setTimeout(() => {
                    if (statusDiv.innerHTML !== originalText && statusDiv.innerHTML.includes('🔄')) {
                        statusDiv.innerHTML = originalText;
                    }
                }, 3000);
            }
            
            // ANUNCIAR POR VOZ
            hablarModo(mensaje);
            
            // Vibración (opcional)
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
            
            console.log(`🔄 ${mensaje}`);
        };
        
        function handleButtonClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            clickCount++;
            
            if (clickCount === 1) {
                clickTimer = setTimeout(function() {
                    window.toggleDarkModeManual();
                    clickCount = 0;
                }, 250);
            } else if (clickCount === 2) {
                clearTimeout(clickTimer);
                window.resetearModoAutomatico();
                clickCount = 0;
            }
            
            return false;
        }
        
        function setupDarkModeButton() {
            const darkModeBtn = document.getElementById('toggle-darkmode');
            if (!darkModeBtn) return;
            
            const newBtn = darkModeBtn.cloneNode(true);
            darkModeBtn.parentNode.replaceChild(newBtn, darkModeBtn);
            newBtn.onclick = handleButtonClick;
        }
        
        function iniciarModo() {
            aplicarModo();
            setupDarkModeButton();
            
            setInterval(function() {
                if (modoManual === null) {
                    aplicarModo();
                }
            }, 60000);
            
            // Anunciar inicio (solo la primera vez)
            setTimeout(() => {
                const modoActual = document.body.classList.contains('dark-mode') ? 'oscuro' : 'claro';
                hablarModo(`Modo ${modoActual} activado. Click para cambiar, doble click para automático.`);
            }, 2000);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarModo);
        } else {
            iniciarModo();
        }
    })();
</script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #f0f0f0; 
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif; 
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* Modo oscuro - fondos */
        body.dark-mode {
            background: #1a1f2e;
        }
        
        body.dark-mode #map-container {
            background: #1a1f2e;
        }
        
        #map-container { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            background: #f0f0f0;
        }
        
        #map { 
            width: 300vw; 
            height: 300vh; 
            position: absolute; 
            top: -100vh; 
            left: -100vw; 
            z-index: 1;
            transform-origin: center center;
            transition: transform 0.2s ease-out;
        }
        
        @media (max-width: 768px) {
            #map-container {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
            }
            #map {
                width: 250vw;
                height: 250vh;
                top: -75vh;
                left: -75vw;
                transform-origin: center center;
            }
        }
        
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #f0f0f0 0%, #ffffff 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease, background 0.3s ease;
        }
        
        body.dark-mode #loading-overlay {
            background: linear-gradient(135deg, #0f141f 0%, #1a1f2e 100%);
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .loading-content { text-align: center; animation: fadeInUp 0.6s ease; }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        body.dark-mode .loading-spinner {
            border: 3px solid rgba(56, 189, 248, 0.3);
            border-top-color: #38bdf8;
        }
        
        .loading-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .loading-text { color: #666; font-size: 14px; letter-spacing: 1px; }
        
        body.dark-mode .loading-text { color: #94a3b8; }
        
        .loading-progress {
            width: 200px;
            height: 2px;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 2px;
            margin: 20px auto 0;
            overflow: hidden;
        }
        
        .loading-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            transition: width 0.3s ease;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #voice-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1002;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid #8B5CF6;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        #voice-indicator span { color: #FFFFFF !important; font-size: 13px !important; font-weight: 600 !important; letter-spacing: 0.5px !important; }
        #voice-indicator.active { border-color: #8B5CF6; box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); background: rgba(20, 20, 30, 0.98); }
        #voice-indicator.speaking span { color: #00f2ff !important; text-shadow: 0 0 5px rgba(0, 242, 255, 0.5); }
        
        .voice-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #8B5CF6;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 5px rgba(139, 92, 246, 0.8);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); background: #8B5CF6; }
            50% { opacity: 0.5; transform: scale(1.2); background: #00f2ff; }
        }
        
        .voice-notification {
            position: fixed;
            bottom: 90px;
            left: 20px;
            background: rgba(20, 20, 30, 0.98);
            backdrop-filter: blur(15px);
            padding: 14px 22px;
            border-radius: 50px;
            border-left: 4px solid #8B5CF6;
            z-index: 1003;
            animation: slideUp 0.3s ease;
            max-width: 320px;
            pointer-events: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }
        
        .voice-notification span { color: #FFFFFF !important; font-size: 14px !important; font-weight: 500 !important; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #ui-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            pointer-events: none;
            max-width: 400px;
        }
        
        .job-card {
            background: rgba(20, 20, 30, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border-top: 4px solid #8B5CF6;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-control {
            background: linear-gradient(135deg, #8B5CF6, #7c3aed);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        
        .btn-control:active { transform: scale(0.97); }
        
        #search-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .round-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #8B5CF6;
            color: #8B5CF6;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .round-btn:active { transform: scale(0.92); background: #8B5CF6; color: white; }
        .round-btn.dark-active { background: #8B5CF6; color: white; border-color: #666; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-title">GPS MapKalo</div>
            <div class="loading-text">Cargando mapa y rutas...</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="voice-indicator" style="opacity: 0.5; border-color: #555;">
        <div class="voice-dot" style="background: #555;"></div>
        <span>Asistente de voz inactivo</span>
    </div>

    <div id="ui-overlay">
        <div class="job-card" id="main-panel">
            <div id="min-max-btn" onclick="window.togglePanel && togglePanel()" style="position: absolute; top: 12px; right: 16px; cursor: pointer; color: #8B5CF6; font-weight: bold; font-size: 20px; z-index: 10; pointer-events: all;">−</div>

            <div id="header-mini" style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid rgba(139, 92, 246, 0.15);">
                <div>
                    <div style="display: flex; align-items: baseline; gap: 6px;">
                        <span id="ui-speed" style="font-size: 42px; font-weight: 900; line-height: 1; color: white;">0</span>
                        <span style="color: #8B5CF6; font-size: 13px;">km/h</span>
                    </div>
                </div>
                <div id="speed-limit-sign" style="display: none; flex-shrink: 0; width: 56px; height: 56px; border-radius: 50%; background: #fff; border: 4px solid #e00; justify-content: center; align-items: center; font-size: 22px; font-weight: 900; color: #222; box-shadow: 0 2px 8px rgba(0,0,0,0.4);">
                    <span id="ui-speed-limit">-</span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span id="ui-fuel-percent" style="font-size: 28px; font-weight: 900; color: #00f2ff;">0%</span>
                    <div id="fuel-r" class="fuel-icon"></div>
                </div>
            </div>
            
            <div id="extra-content" style="padding: 0 16px 16px 16px;">
                <div class="info-row" style="background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 10px; margin: 10px 0; border: 1px solid rgba(139, 92, 246, 0.2);">
                    <span class="label" style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; display: block; margin-bottom: 4px;">CARGA</span>
                    <span id="ui-cargo" class="value" style="font-size: 16px; color: #8B5CF6; font-weight: 700;">Buscando carga...</span>
                </div>
                <div class="info-row" style="background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(139, 92, 246, 0.2);">
                    <span class="label" style="color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; display: block; margin-bottom: 4px;">RUTA</span>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="ui-source" class="value" style="font-size: 13px; color: #8B5CF6; font-weight: 600;">---</span>
                        <span style="color: #8B5CF6;">➔</span>
                        <span id="ui-dest" class="value" style="font-size: 13px; color: #8B5CF6; font-weight: 600;">---</span>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item" style="background: rgba(255, 255, 255, 0.9); padding: 10px 8px; border-radius: 12px; text-align: center; border: 1px solid rgba(139, 92, 246, 0.2);"><span class="label" style="color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;">RESTANTE</span><span id="ui-dist" class="value" style="font-size: 18px; color: #8B5CF6; font-weight: bold; font-family: monospace;">0 km</span></div>
                    <div class="stat-item" style="background: rgba(255, 255, 255, 0.9); padding: 10px 8px; border-radius: 12px; text-align: center; border: 1px solid rgba(139, 92, 246, 0.2);"><span class="label" style="color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;">TIEMPO REAL</span><span id="ui-game-time" class="value" style="font-size: 18px; color: #8B5CF6; font-weight: bold; font-family: monospace;">0h 0m</span></div>
                    <div class="stat-item" style="background: rgba(255, 255, 255, 0.9); padding: 10px 8px; border-radius: 12px; text-align: center; border: 1px solid rgba(139, 92, 246, 0.2);"><span class="label" style="color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;">LLEGADA</span><span id="ui-eta-real" class="value" style="font-size: 18px; color: #4CAF50 !important; font-weight: bold; font-family: monospace;">--:--</span></div>
                </div>
                <button id="toggle-follow" class="btn-control" onclick="window.toggleFollow && toggleFollow()">🧭 Seguir vehículo</button>
                <button id="toggle-company-route" class="btn-control" onclick="window.deactivateCompanyRoute && deactivateCompanyRoute()" style="display: none; background: linear-gradient(135deg, #ff6b6b, #ee5a52); color: #fff !important; margin-top: 10px;">✕ Cancelar ruta</button>
            </div>
        </div>
    </div>

    <div id="search-panel">
        <button id="search-btn" class="round-btn">🔍</button>
        <button id="toggle-voice" class="round-btn" style="opacity: 0.5;">🔇</button>
        <button id="toggle-darkmode" class="round-btn" title="Modo oscuro">🌙</button>
        <button id="toggle-pois" class="round-btn" title="Mostrar gasolineras y talleres">⛽</button>
        <button id="toggle-companies" class="round-btn" title="Mostrar empresas">🏢</button>
        <button id="toggle-fullscreen" class="round-btn" title="Pantalla completa">⛶</button>
        <div id="search-container" style="display: none; position: absolute; top: 60px; right: 0; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 2px solid #8B5CF6; border-radius: 16px; width: 280px; max-width: calc(100vw - 32px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden;">
            <input id="search-input" type="text" placeholder="Buscar ciudad..." style="width: 100%; padding: 14px 16px; background: rgba(139, 92, 246, 0.05); border: none; border-bottom: 2px solid rgba(139, 92, 246, 0.3); color: #8B5CF6; font-size: 14px; outline: none;" />
            <div id="cities-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="companies-panel" style="display: none; position: absolute; top: 130px; right: 16px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 2px solid #8B5CF6; border-radius: 16px; width: 300px; max-width: calc(100vw - 32px); max-height: 50vh; z-index: 1001; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 2px solid rgba(139, 92, 246, 0.3);">
            <h4 id="companies-title" style="margin: 0; color: #8B5CF6; font-size: 14px;">Empresas</h4>
            <button id="close-companies" style="background: none; border: none; color: #8B5CF6; font-size: 24px; cursor: pointer;">×</button>
        </div>
        <div id="companies-list" style="max-height: 50vh; overflow-y: auto; padding: 12px;"></div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="leaflet.js"></script>
    <script src="leaflet-rotate.js"></script>
    <script src="main.js"></script>
    
    <script>
    // ==========================================
    // SOLO INVALIDAR TAMAÑO DEL MAPA
    // ==========================================
    (function() {
        var resizeTimeout;
        
        function invalidateMap() {
            if (typeof map !== 'undefined' && map) {
                try {
                    // SOLO invalidar el tamaño, nada más
                    map.invalidateSize();
                    console.log('📏 Mapa invalidado (tamaño recalculado)');
                } catch(e) {
                    console.log('Error al invalidar mapa:', e);
                }
            }
        }
        
        // Al cambiar el tamaño de la ventana
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(invalidateMap, 150);
        });
        
        // Al cambiar la orientación
        window.addEventListener('orientationchange', function() {
            setTimeout(invalidateMap, 200);
        });
        
        console.log('✅ Sistema de invalidación de mapa activado (sin re-centrado)');
    })();
    </script>
</body>
</html>
